# orc.yaml — workspace configuration
#
# Single config file for repos, workflows, and workspace settings.
# Run `orc health` to verify the workspace.
# After editing, the TUI picks up changes on the next auto-refresh.

# settings:
#   default_workflow: default     # workflow used by `orc work` when --workflow is omitted
#   auto_archive: false           # archive tickets automatically when the last stage completes
#   auto_tmux: false              # always use tmux for new tickets (same as orc work --tmux)
#   auto_next: false              # always launch the first stage after orc work (same as orc work --next)
#   tui_refresh: 60               # TUI auto-refresh interval in seconds (default: 60)
#   theme: catppuccin-mocha       # TUI color theme (default: catppuccin-mocha)

settings:
  default_workflow: default
  quotes:
    - "Mmm... human burgers!"
    - "Do we get fries with that?"
    - "We eat you for lunch!"
    - "Trolls rule!"
    - "We will break you!"
    - "We are not amused!"
    - "Don't... make... me... MAD!"
    - "I'M...GETTING...ANGRY!!!"
    - "Hey! What did I ever do to you?"
    - "Oh no! Smack a Troll!"
    - "Ha! My trolls will stop you!"
    - "No. No! NOOOOOOOOOOOOOOOO!!!!!!!!"
    - "BOOMSHAKALAKA!"
    - "You think this is funny?"
    - "I'm gonna make you look like an accident."
    - "That's right! Rule the universe!"
    - "Trolls. Get him. Go! Now!"

repos:
  - name: my-app
    path: ../..
    purpose: Application code, APIs, tests

workflows:
  default:
    stages:
      - name: intake
        worker: fred-documentor
        advance: auto
      - name: develop
        worker: bob-developer
        advance: manual
      - name: code-review
        worker: bob-developer
        advance: auto
      - name: pr-open
        worker: bob-developer
        advance: manual
      - name: qa-automation
        worker: brian-qa
        advance: auto

  hotfix:
    stages:
      - name: intake
        worker: fred-documentor
        advance: auto
      - name: patch
        worker: bob-developer
        advance: manual
      - name: deploy
        worker: bob-developer
        advance: auto

repair_stages:
  pr-repair:
    repairs: pr-open
    worker: bob-developer
    advance: auto
    max_retries: 3
