# orc.yaml — workspace configuration
#
# Single config file for repos, workflows, and workspace settings.
# Run `orc health` to verify the workspace.
# After editing, the TUI picks up changes on the next auto-refresh.

# settings:
#   default_workflow: default     # workflow used by `orc work` when --workflow is omitted
#   auto_archive: false           # archive tickets automatically when the last stage completes
#   tui_refresh: 60               # TUI auto-refresh interval in seconds (default: 60)
#   quotes:                       # custom TUI quotes (overrides built-in set)
#     - "Ship it."
#     - "Make it work, make it right, make it fast."
#     - "Done is better than perfect."

repos:
  - name: my-app
    path: ../..
    purpose: Application code, APIs, tests

workflows:
  default:
    stages:
      - name: intake
        worker: fred-documentor
        advance: auto
      - name: develop
        worker: bob-developer
        advance: manual
      - name: code-review
        worker: bob-developer
        advance: auto
      - name: pr-open
        worker: bob-developer
        advance: manual
      - name: qa-automation
        worker: brian-qa
        advance: auto

  hotfix:
    stages:
      - name: intake
        worker: fred-documentor
        advance: auto
      - name: patch
        worker: bob-developer
        advance: manual
      - name: deploy
        worker: bob-developer
        advance: auto

repair_stages:
  pr-repair:
    repairs: pr-open
    worker: bob-developer
    advance: auto
    max_retries: 3
