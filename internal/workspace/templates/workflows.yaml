# workflows.yaml — define named pipelines and their stage sequences
#
# Each workflow is an ordered list of stages. Stages reference files in stages/.
# repair_stages declare optional loops (e.g. pr-repair loops back to pr-open).

workflows:
  default:
    stages:
      - name: intake
        worker: fred-documentor
        advance: auto
      - name: develop
        worker: bob-developer
        advance: manual
      - name: code-review
        worker: zach-reviewer
        advance: auto
      - name: pr-open
        worker: bob-developer
        advance: manual
      - name: qa-automation
        worker: brian-qa
        advance: auto

repair_stages:
  pr-repair:
    repairs: pr-open
    worker: bob-developer
    advance: auto
    max_retries: 3
