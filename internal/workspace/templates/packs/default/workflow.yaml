workflows:
  default:
    stages:
      - name: intake
        worker: fred-documentor
        advance: auto
      - name: develop
        worker: bob-developer
        advance: manual
        loop:
          via: code-review
          worker: zach-reviewer
          max: 3
          on_max: pause    # pause for human review when loop limit is reached
      - name: pr-open
        worker: bob-developer
        advance: manual
        loop:
          via: pr-repair
          worker: bob-developer
          max: 3
          on_max: pause    # pause for human review when loop limit is reached
      - name: qa-automation
        worker: brian-qa
        advance: auto
