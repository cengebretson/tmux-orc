commands:
  intake:
    description: Load ticket context and populate the feature folder.
    workflow: intake
    stage: intake
    worker: intake-agent

  implementation:
    description: Implement the feature in the repo worktree.
    workflow: develop
    stage: implementation
    worker: developer

  pr-open:
    description: Run preflight checks and open a pull request.
    workflow: pr-open
    stage: pr_preflight
    worker: developer

  pr-repair:
    description: Repair CI failures, review feedback, or merge conflicts.
    workflow: pr-repair
    stage: pr_repair
    worker: developer

  qa-plan:
    description: Produce a QA automation plan from the implementation handoff.
    workflow: develop
    stage: qa_plan
    worker: documentor

  qa-implement:
    description: Implement automated tests from the QA plan.
    workflow: qa-automation
    stage: qa_implementation
    worker: developer

  evidence:
    description: Collect QA evidence and update the ticket.
    workflow: develop
    stage: evidence
    worker: documentor
